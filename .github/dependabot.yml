version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 3
    rebase-strategy: disabled
    labels:
      - "ci"
    groups:
      actions:
        applies-to: version-updates
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "06:05"
      timezone: "Europe/Amsterdam"
    versioning-strategy: increase
    open-pull-requests-limit: 1
    cooldown:
      default-days: 3
    rebase-strategy: disabled
    labels:
      - "build"
    groups:
      dependencies:
        applies-to: version-updates
        patterns:
          - "*"
